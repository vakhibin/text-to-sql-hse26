version: "1.2"
prompts:
  sql_generation:
    description: "Basic SQL generation prompt"
    template: |
      You are an SQL expert. Generate SQL for the question.
      
      Database Schema:
      {schema}
      
      Question: {question}
      
      SQL Query:
    input_variables: ["schema", "question"]
    metadata:
      temperature: 0.1
      max_tokens: 512